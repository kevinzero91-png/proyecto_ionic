<ion-header class="ion-no-border">
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start">
      <ion-button (click)="modalCtrl.dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    
    <ion-title>{{ id_categoria ? 'Editar Categoría' : 'Nueva Categoría' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding form-content">
  
  <div class="form-header">
    <h2>Información de la Categoría</h2>
    <p>Asigna un nombre descriptivo para clasificar tus tareas.</p>
  </div>

  <ion-card class="form-card">
    <ion-card-content>
      
      <form [formGroup]="categoria" (ngSubmit)="guardarDatos()">
        
        <div class="input-group">
          <ion-label position="stacked" class="custom-label">Nombre de la Categoría <span class="required">*</span></ion-label>
          <ion-input 
            formControlName="nombre" 
            placeholder="Ej. Diseño, Desarrollo, Marketing..." 
            clearInput="true"
            class="custom-input">
          </ion-input>

          <ng-container *ngFor="let msg of mensajes_validacion.nombre">
            <div class="error-message" *ngIf="categoria.get('nombre')?.hasError(msg.type) && (categoria.get('nombre')?.dirty || categoria.get('nombre')?.touched)">
              <ion-icon name="alert-circle-outline"></ion-icon>
              {{ msg.message }}
            </div>
          </ng-container>
        </div>

        <div class="action-container">
          <ion-button 
    expand="block" 
    size="large" 
    color="tertiary" 
    type="submit" 
    [disabled]="!categoria.valid"> Guardar Categoría
</ion-button>
        </div>

      </form>
      </ion-card-content>
  </ion-card>

</ion-content>

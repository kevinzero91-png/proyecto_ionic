<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="perfil-content" color="dark">
  <div class="perfil-container">

    <div class="avatar-section">
      <div class="avatar-wrapper" (click)="cambiarFoto()">
        <img [src]="fotoActual" alt="Avatar">
        <div class="edit-overlay"><ion-icon name="camera-outline"></ion-icon></div>
      </div>
      <p class="edit-text">Cambiar foto de perfil</p>
      
      <input type="file" id="avatarInput" (change)="seleccionarArchivo($event)" accept="image/*" style="display: none;">
    </div>

    <ion-card class="modern-card">
      <ion-card-content>
        <form [formGroup]="perfilForm" (ngSubmit)="guardarCambios()">
          <ion-item class="modern-input" lines="none">
            <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
            <ion-input formControlName="nombre" type="text" label="Nombre" labelPlacement="stacked"></ion-input>
          </ion-item>

          <ion-item class="modern-input" lines="none">
            <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
            <ion-input formControlName="email" type="email" label="Correo" labelPlacement="stacked"></ion-input>
          </ion-item>

          <ion-button expand="block" type="submit" [disabled]="perfilForm.invalid" class="save-btn">
            Guardar Cambios
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>

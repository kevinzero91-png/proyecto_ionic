<ion-content class="login-content">
  <div class="login-container">
    
    <div class="brand-header">
      <div class="logo-wrapper">
        <ion-icon name="layers-outline" class="brand-logo"></ion-icon>
      </div>
      <h1>Task<span>Flow</span></h1>
      <p>Crear Nueva Cuenta</p>
    </div>

    <ion-card class="modern-card">
      <ion-card-content>
        <form [formGroup]="registroForm" (ngSubmit)="procesarRegistro()">
          
          <div class="input-group">
            <ion-label position="stacked">Nombre o Usuario</ion-label>
            <ion-input 
              formControlName="username" 
              type="text" 
              placeholder="Ej. Jhonathan o Alberto"
              class="clean-input">
            </ion-input>
          </div>

          <div class="input-group">
            <ion-label position="stacked">Correo Electrónico</ion-label>
            <ion-input 
              formControlName="email" 
              type="email" 
              placeholder="ejemplo@empresa.com"
              class="clean-input">
            </ion-input>
          </div>

          <div class="input-group">
            <ion-label position="stacked">Contraseña (Mín. 6 caracteres)</ion-label>
            <ion-input 
              formControlName="password" 
              type="password" 
              placeholder="••••••••"
              class="clean-input">
            </ion-input>
          </div>

          <ion-button expand="block" type="submit" [disabled]="registroForm.invalid" class="primary-btn" style="margin-top: 20px;">
            Registrarse
          </ion-button>

          <div class="toggle-section" style="text-align: center; margin-top: 25px;">
            <p>¿Ya tienes una cuenta? <a (click)="volverAlLogin()">Inicia sesión aquí</a></p>
          </div>

        </form>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
